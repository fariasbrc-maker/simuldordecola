
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Simulador Decola Trimestral V4</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(180deg,#ff6a00,#ff8c1a)}
.wrap{max-width:430px;margin:auto;padding:8px}
.header{text-align:center;color:#fff;padding:4px 0 8px}
.header h1{margin:0;font-size:22px;line-height:1.05}
.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.card{background:#fff;border-radius:16px;box-shadow:0 2px 8px rgba(0,0,0,.12)}
.kpi{padding:8px;text-align:center}
.kpi .v{font-size:18px;font-weight:700;color:#ff6200}
.progress{padding:8px;margin:8px 0}
.bar{height:10px;background:#eee;border-radius:99px;overflow:hidden}
.fill{height:100%;width:0;background:#ff6200}
.item{display:grid;grid-template-columns:40px 1fr 70px 70px;gap:6px;align-items:center;padding:8px;margin:6px 0}
.icon{width:40px;height:40px;border-radius:12px;background:#ff6200;color:#fff;display:flex;align-items:center;justify-content:center;font-size:20px}
.tt{font-size:13px;font-weight:700;line-height:1.1}
.tt small{display:block;color:#ff6200}
input{width:100%;height:28px;border:1px solid #ddd;border-radius:8px;text-align:center;font-size:12px}
.btn{width:100%;padding:10px;border:none;border-radius:14px;background:#ff6200;color:#fff;font-weight:700;font-size:16px;margin-top:6px}
.result{padding:10px;margin-top:8px;text-align:center}
.big{font-size:32px;font-weight:800;color:#ff6200}
</style>
</head>
<body>
<div class="wrap">
<div class="header">
<div>🚀</div>
<h1>SIMULADOR DECOLA TRIMESTRAL</h1>
<div>Coordenação 6391</div>
</div>

<div class="kpis">
<div class="card kpi">🎯<div class="v">150%</div></div>
<div class="card kpi">🏆<div class="v" id="icm">0%</div></div>
<div class="card kpi">📈<div class="v" id="perf">0%</div></div>
</div>

<div class="card progress">
<div style="display:flex;justify-content:space-between;font-size:12px"><b>Progresso</b><span id="pct">0%</span></div>
<div class="bar"><div class="fill" id="fill"></div></div>
</div>

<div class="card item"><div class="icon">💳</div><div class="tt">Crédito<small>38%</small></div><input id="d1" placeholder="D"><input id="r1" placeholder="R"></div>
<div class="card item"><div class="icon">📦</div><div class="tt">Produtos<small>28%</small></div><input id="d2" placeholder="D"><input id="r2" placeholder="R"></div>
<div class="card item"><div class="icon">💰</div><div class="tt">Recup.<small>23%</small></div><input id="d3" placeholder="D"><input id="r3" placeholder="R"></div>
<div class="card item"><div class="icon">👥</div><div class="tt">Engaj.<small>11%</small></div><input id="d4" placeholder="D"><input id="r4" placeholder="R"></div>
<div class="card item"><div class="icon">🎯</div><div class="tt">Gera<small>1000</small></div><div></div><input id="gera" placeholder="R"></div>
<div class="card item"><div class="icon">⭐</div><div class="tt">Satisf.<small>100</small></div><div></div><input id="sat" placeholder="R"></div>

<button class="btn" onclick="calc()">CALCULAR</button>

<div class="card result">
<div>🏆 Resultado Final</div>
<div class="big" id="total">0%</div>
</div>
</div>

<script>
function cap(v){return Math.min(v,2)}
function calc(){
let t=0;
t+=cap((+r1.value||0)/(+d1.value||1))*38;
t+=cap((+r2.value||0)/(+d2.value||1))*28;
t+=cap((+r3.value||0)/(+d3.value||1))*23;
t+=cap((+r4.value||0)/(+d4.value||1))*11;
t+=cap((+gera.value||0)/1000)*30;
t+=cap((+sat.value||0)/100)*20;
let p=(t/150)*100;
icm.textContent=t.toFixed(1)+'%';
perf.textContent=p.toFixed(1)+'%';
pct.textContent=p.toFixed(1)+'%';
total.textContent=t.toFixed(1)+'%';
fill.style.width=Math.min(p,100)+'%';
}
</script>
</body>
</html>
