
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador Decola Trimestral</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Outfit,sans-serif;background:linear-gradient(180deg,#ff6a00,#ff8c1a);padding:12px}
.wrap{max-width:700px;margin:auto}
.top,.result,.card{background:#fff;border-radius:20px;box-shadow:0 8px 20px rgba(0,0,0,.12)}
.top{padding:16px;text-align:center;margin-bottom:10px}
.top h1{font-size:24px;color:#ff6a00}
.top p{color:#666;font-size:13px}
.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.kpi{background:#fff;border-radius:16px;padding:10px;text-align:center}
.kpi .v{font-size:24px;font-weight:800;color:#ff6a00}
.result{padding:14px;text-align:center;margin-bottom:10px}
.big{font-size:42px;font-weight:800;color:#ff6a00}
.bar{height:12px;background:#eee;border-radius:999px;overflow:hidden;margin-top:8px}
.fill{height:100%;width:0;background:linear-gradient(90deg,#ff6a00,#ffb347);transition:1s}
.card{padding:12px;margin-bottom:8px}
.head{display:flex;justify-content:space-between;margin-bottom:8px}
.t{font-weight:700}
.w{color:#ff6a00;font-size:12px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
input{width:100%;padding:10px;border:1px solid #ddd;border-radius:10px}
button{width:100%;padding:14px;border:none;border-radius:16px;background:#222;color:#fff;font-size:18px;font-weight:700}
.msg{margin-top:8px;font-weight:700}
@media(max-width:600px){.big{font-size:36px}}
</style>
</head>
<body>
<div class="wrap">
<div class="top">
<h1>🚀 SIMULADOR DECOLA TRIMESTRAL</h1>
<p>Coordenação 6391</p>
</div>

<div class="kpis">
<div class="kpi">🎯 Meta<div class="v">150%</div></div>
<div class="kpi">🏆 ICM<div class="v" id="icm">0%</div></div>
<div class="kpi">📈 Perf.<div class="v" id="perf">0%</div></div>
</div>

<div class="result">
<div>🏆 ICM TOTAL</div>
<div class="big" id="total">0%</div>
<div class="bar"><div class="fill" id="fill"></div></div>
<div class="msg" id="msg">Preencha os dados</div>
</div>

<div class="card"><div class="head"><div class="t">💳 Crédito</div><div class="w">Peso 38%</div></div><div class="grid"><input id="d1" placeholder="Desafio"><input id="r1" placeholder="Realizado"></div></div>
<div class="card"><div class="head"><div class="t">📦 Produtos</div><div class="w">Peso 28%</div></div><div class="grid"><input id="d2" placeholder="Desafio"><input id="r2" placeholder="Realizado"></div></div>
<div class="card"><div class="head"><div class="t">💰 Recuperação</div><div class="w">Peso 23%</div></div><div class="grid"><input id="d3" placeholder="Desafio"><input id="r3" placeholder="Realizado"></div></div>
<div class="card"><div class="head"><div class="t">🔥 Engajamento</div><div class="w">Peso 11%</div></div><div class="grid"><input id="d4" placeholder="Desafio"><input id="r4" placeholder="Realizado"></div></div>

<div class="card"><div class="head"><div class="t">🎯 Gera</div><div class="w">Meta fixa 1000</div></div><input id="gera" placeholder="Realizado"></div>
<div class="card"><div class="head"><div class="t">⭐ Satisfação</div><div class="w">Meta fixa 100</div></div><input id="sat" placeholder="Realizado"></div>

<button onclick="calc()">CALCULAR RESULTADO</button>
</div>

<script>
function cap(v){return Math.min(v,2);}
function calc(){
 let t=0;
 t+=cap((+r1.value||0)/(+d1.value||1))*38;
 t+=cap((+r2.value||0)/(+d2.value||1))*28;
 t+=cap((+r3.value||0)/(+d3.value||1))*23;
 t+=cap((+r4.value||0)/(+d4.value||1))*11;
 t+=cap((+gera.value||0)/1000)*30;
 t+=cap((+sat.value||0)/100)*20;

 total.innerHTML=t.toFixed(1)+'%';
 icm.innerHTML=t.toFixed(1)+'%';

 let perf=((t/150)*100);
 perf = Math.max(0,perf);
 document.getElementById('perf').innerHTML=perf.toFixed(1)+'%';

 fill.style.width=Math.min(perf,100)+'%';

 msg.innerHTML=t<100?'⚠️ Abaixo da meta':(t<150?'👏 Quase lá':'🏆 Meta atingida');
}
</script>
</body>
</html>
