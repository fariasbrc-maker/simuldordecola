
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Simulador Decola Trimestral - Compacto</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
body{margin:0;background:linear-gradient(180deg,#ff6a00,#ff8c1a);font-family:Outfit,sans-serif;padding:10px}
.wrap{max-width:850px;margin:auto}
.top{background:#fff;border-radius:18px;padding:12px;text-align:center}
h1{margin:0;font-size:24px;color:#ff6a00}
.sub{color:#666;font-size:13px}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:10px 0}
.stat{background:#fff;border-radius:14px;padding:10px;text-align:center}
.stat b{display:block;font-size:26px;color:#ff6a00}
.card{background:#fff;border-radius:16px;padding:10px;margin-bottom:8px}
.row{display:grid;grid-template-columns:1.2fr 1fr 1fr;gap:8px;align-items:center}
.t{font-weight:700;color:#222}
.p{color:#ff6a00;font-size:13px}
input{width:100%;padding:10px;border:1px solid #ddd;border-radius:10px}
.btn{width:100%;padding:14px;border:none;border-radius:14px;background:#222;color:#fff;font-size:18px;font-weight:700;margin-top:8px}
.res{background:#fff;border-radius:18px;padding:12px;margin-top:10px;text-align:center}
.big{font-size:42px;font-weight:800;color:#ff6a00}
.bar{height:12px;background:#eee;border-radius:999px;overflow:hidden}
.fill{height:100%;width:0;background:#ff6a00;transition:1s}
@media(max-width:600px){
.stats{grid-template-columns:1fr 1fr 1fr}
.row{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="wrap">
<div class="top">
<h1>🚀 SIMULADOR DECOLA TRIMESTRAL</h1>
<div class="sub">Coordenação 6391</div>
</div>

<div class="stats">
<div class="stat">🎯<b>100%</b></div>
<div class="stat">🏆<b id="icm">0%</b></div>
<div class="stat">📈<b id="perf">0%</b></div>
</div>

<div class="card"><div class="row"><div><div class="t">💳 Crédito</div><div class="p">Peso 38%</div></div><input id="d1" placeholder="Desafio"><input id="r1" placeholder="Realizado"></div></div>
<div class="card"><div class="row"><div><div class="t">📦 Produtos</div><div class="p">Peso 28%</div></div><input id="d2" placeholder="Desafio"><input id="r2" placeholder="Realizado"></div></div>
<div class="card"><div class="row"><div><div class="t">💰 Recuperação</div><div class="p">Peso 23%</div></div><input id="d3" placeholder="Desafio"><input id="r3" placeholder="Realizado"></div></div>
<div class="card"><div class="row"><div><div class="t">🔥 Engajamento</div><div class="p">Peso 11%</div></div><input id="d4" placeholder="Desafio"><input id="r4" placeholder="Realizado"></div></div>

<div class="card"><div class="row"><div><div class="t">🎯 Gera</div><div class="p">Meta fixa 1000</div></div><div></div><input id="gera" placeholder="Realizado"></div></div>
<div class="card"><div class="row"><div><div class="t">⭐ Satisfação</div><div class="p">Meta fixa 100</div></div><div></div><input id="sat" placeholder="Realizado"></div></div>

<button class="btn" onclick="calc()">CALCULAR RESULTADO</button>

<div class="res">
<div>🏆 ICM TOTAL</div>
<div class="big" id="resultado">0,0%</div>
<div class="bar"><div class="fill" id="fill"></div></div>
<div id="msg">Preencha os dados</div>
</div>
</div>

<script>
function cap(v){return Math.min(v,2);}
function calc(){
let t=0;
t+=cap((+r1.value||0)/(+d1.value||1))*38;
t+=cap((+r2.value||0)/(+d2.value||1))*28;
t+=cap((+r3.value||0)/(+d3.value||1))*23;
t+=cap((+r4.value||0)/(+d4.value||1))*11;
t+=cap((+gera.value||0)/1000)*30;
t+=cap((+sat.value||0)/100)*20;
resultado.innerHTML=t.toFixed(1)+'%';
icm.innerHTML=t.toFixed(1)+'%';
perf.innerHTML=t.toFixed(1)+'%';
fill.style.width=Math.min(t,200)/2+'%';
msg.innerHTML=t<70?'⚠️ Atenção':(t<=100?'👏 Bom desempenho':'🏆 Excelente desempenho');
}
</script>
</body>
</html>
